<!DOCTYPE html>
<html>
<head>
    <title>YouTube Summarizer AI</title>
</head>

<body>
    <h1>YouTube Summarizer AI</h1>

    <input
        id="url"
        placeholder="Paste YouTube video URL here">

    <button onclick="summarize()">
        Summarize
    </button>

    <pre id="output"></pre>

    <script>
        async function summarize() {
            const url =
                document.getElementById("url").value;

            const res = await fetch(
                "http://127.0.0.1:5000/summarize",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body: JSON.stringify({ url })
                }
            );

            const data = await res.json();

            document.getElementById("output")
                .innerText = data.summary;

            // show chat section after summary loads
            document.getElementById("chatSection")
                .style.display = "block";
        }
    </script>

    <!-- Follow up question section -->
    <div id="chatSection" style="display:none;">

        <input
            id="questionInput"
            placeholder="Ask a follow up question about the video">

        <button onclick="askQuestion()">
            Ask
        </button>

        <div id="answerOutput"></div>

    </div>

    <script>
        async function askQuestion() {
            const question =
                document.getElementById(
                    "questionInput"
                ).value;

            const res = await fetch(
                "http://127.0.0.1:5000/ask",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body: JSON.stringify({ question })
                }
            );

            const data = await res.json();

            document.getElementById("answerOutput")
                .innerText = data.answer;
        }
    </script>

</body>
</html>
